bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: odom
    robot_base_frame: base_link
    odom_topic: /go2w/perception/odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    default_nav_to_pose_bt_xml: ""
    default_nav_through_poses_bt_xml: ""
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_pipeline_sequence_bt_node

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: true

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: true

controller_server:
  ros__parameters:
    use_sim_time: true
    odom_topic: /go2w/perception/odom
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugin: progress_checker
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.003
      movement_time_allowance: 60.0
    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      xy_goal_tolerance: 0.015
      yaw_goal_tolerance: 0.20
    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      debug_trajectory_details: false
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.12
      max_vel_y: 0.0
      max_vel_theta: 0.60
      min_speed_xy: 0.0
      max_speed_xy: 0.12
      min_speed_theta: 0.0
      acc_lim_x: 0.40
      acc_lim_y: 0.0
      acc_lim_theta: 1.20
      decel_lim_x: -0.40
      decel_lim_y: 0.0
      decel_lim_theta: -1.20
      vx_samples: 12
      vy_samples: 1
      vtheta_samples: 20
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.015
      trans_stopped_velocity: 0.02
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 24.0
      PathAlign.forward_point_distance: 0.10
      GoalAlign.scale: 18.0
      GoalAlign.forward_point_distance: 0.10
      PathDist.scale: 24.0
      GoalDist.scale: 18.0
      RotateToGoal.scale: 24.0
      RotateToGoal.slowing_factor: 4.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 0.5
      update_frequency: 5.0
      publish_frequency: 2.0
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.10
      robot_radius: 0.35
      footprint_padding: 0.02
      always_send_full_costmap: true
      track_unknown_space: false
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: nav2_costmap_2d::VoxelLayer
        enabled: true
        publish_voxel_map: false
        origin_z: -0.20
        z_resolution: 0.10
        z_voxels: 16
        max_obstacle_height: 1.80
        mark_threshold: 0
        unknown_threshold: 15
        combination_method: 1
        observation_sources: perception_cloud
        perception_cloud:
          topic: /go2w/perception/cloud_body
          data_type: PointCloud2
          expected_update_rate: 0.0
          observation_persistence: 0.0
          marking: true
          clearing: true
          min_obstacle_height: 0.05
          max_obstacle_height: 1.80
          obstacle_min_range: 0.0
          obstacle_max_range: 8.0
          raytrace_min_range: 0.0
          raytrace_max_range: 8.0
          inf_is_valid: false
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        enabled: true
        inflation_radius: 0.45
        cost_scaling_factor: 3.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 0.5
      update_frequency: 2.0
      publish_frequency: 1.0
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.10
      robot_radius: 0.35
      footprint_padding: 0.02
      always_send_full_costmap: true
      track_unknown_space: false
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: nav2_costmap_2d::VoxelLayer
        enabled: true
        publish_voxel_map: false
        origin_z: -0.20
        z_resolution: 0.10
        z_voxels: 16
        max_obstacle_height: 1.80
        mark_threshold: 0
        unknown_threshold: 15
        combination_method: 1
        observation_sources: perception_cloud
        perception_cloud:
          topic: /go2w/perception/cloud_body
          data_type: PointCloud2
          expected_update_rate: 0.0
          observation_persistence: 0.0
          marking: true
          clearing: true
          min_obstacle_height: 0.05
          max_obstacle_height: 1.80
          obstacle_min_range: 0.0
          obstacle_max_range: 8.0
          raytrace_min_range: 0.0
          raytrace_max_range: 8.0
          inf_is_valid: false
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        enabled: true
        inflation_radius: 0.45
        cost_scaling_factor: 3.0

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.25
      use_astar: false
      allow_unknown: true
