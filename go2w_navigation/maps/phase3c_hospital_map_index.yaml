    level_index: 1
    elevation_m: 0.0
    map_yaml: phase3c_hospital_floor_1.yaml
    route_node_ids: [100, 101, 102, 103]
  - id: F2
    level_index: 2
    elevation_m: 2.8
    map_yaml: phase3c_hospital_floor_2.yaml
    route_node_ids: [200, 201, 202]
connectors:
